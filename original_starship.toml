# Premium Minimal Arc Prompt for whitespider
# Designed for Arch Linux + Hyprland

add_newline = true

format = """
[╭ ](fg:#005f5f)$username [󰉋 ](fg:#008080)$directory$git_branch${custom.git_stash}${custom.git_clean}${custom.git_dirty}$cmd_duration
[╰ ](fg:#005f5f)$character """

[username]
show_always = true
style_user = "bold fg:#ffffff"
style_root = "bold fg:#ffffff"
format = "[$user]($style)"

[directory]
style = "bold fg:#008080"
read_only = " 󰌾"
read_only_style = "fg:#ffaf00"
truncation_length = 3
truncation_symbol = "…/"
truncate_to_repo = false
format = "[$path]($style)[$read_only]($read_only_style) "

[git_branch]
symbol = ""
style = "bold fg:#00afaf"
format = "[on ](fg:#005f5f)[$branch]($style) "

[custom.git_stash]
description = "Show stash symbol if stash exists"
command = "git rev-parse --verify refs/stash >/dev/null 2>&1 && printf '⚑'"
when = "git rev-parse --is-inside-work-tree 2>/dev/null"
shell = ["bash", "--noprofile", "--norc"]
style = "bold fg:#ffaf00"
format = "[$output]($style) "

[custom.git_clean]
description = "Show clean symbol if no changes"
command = "test -z \"$(git status --porcelain)\" && printf '✔'"
when = "git rev-parse --is-inside-work-tree 2>/dev/null"
shell = ["bash", "--noprofile", "--norc"]
style = "bold fg:#00ff87"
format = "[$output]($style) "

[custom.git_dirty]
description = "Show dirty symbol if changes exist"
command = "test -n \"$(git status --porcelain)\" && printf '✘'"
when = "git rev-parse --is-inside-work-tree 2>/dev/null"
shell = ["bash", "--noprofile", "--norc"]
style = "bold fg:#ff5f5f"
format = "[$output]($style) "

[cmd_duration]
min_time = 5000
show_milliseconds = false
style = "bold fg:#875fff"
format = "[took ](fg:#005f5f)[󱎫 $duration]($style)"

[character]
success_symbol = "[➜](bold fg:#00afaf)"
error_symbol = "[➜](bold fg:#ff5f5f)"
vimcmd_symbol = "[➜](bold fg:#005f5f)"

[git_status]
disabled = true
[git_state]
disabled = true
[package]
disabled = true
[line_break]
disabled = true
[hostname]
disabled = true
[time]
disabled = true
